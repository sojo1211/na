<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>나루토 손동작 가이드</title>
<style>
  body { background: #111; color: #eee; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
  h1 { color: #f5c518; margin-bottom: 24px; }
  .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; }
  .card {
    background: #222;
    border: 2px solid #444;
    border-radius: 10px;
    padding: 10px;
    width: 160px;
    transition: transform 0.2s, border-color 0.2s;
  }
  .card:hover { transform: scale(1.08); border-color: #f5c518; }
  .card img { width: 140px; height: 140px; object-fit: cover; border-radius: 6px; }
  .card .en { font-size: 12px; color: #aaa; margin-top: 4px; }
  .card .kr { font-size: 18px; font-weight: bold; color: #f5c518; margin-top: 2px; }
  .card .num { font-size: 11px; color: #666; }
</style>
</head>
<body>
<h1>🥷 나루토 손동작(인) 가이드</h1>
<div class="grid">
  <div class="card">
    <img src="setting/sign_images/1_Ne.jpg" alt="쥐">
    <div class="kr">쥐 (子)</div>
    <div class="en">Ne / Rat</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/2_Ushi.jpg" alt="소">
    <div class="kr">소 (丑)</div>
    <div class="en">Ushi / Ox</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/3_Tora.jpg" alt="호랑이">
    <div class="kr">호랑이 (寅)</div>
    <div class="en">Tora / Tiger</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/4_U.jpg" alt="토끼">
    <div class="kr">토끼 (卯)</div>
    <div class="en">U / Hare</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/5_Tatsu.jpg" alt="용">
    <div class="kr">용 (辰)</div>
    <div class="en">Tatsu / Dragon</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/6_Mi.jpg" alt="뱀">
    <div class="kr">뱀 (巳)</div>
    <div class="en">Mi / Snake</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/7_Uma.jpg" alt="말">
    <div class="kr">말 (午)</div>
    <div class="en">Uma / Horse</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/8_Hitsuji.jpg" alt="양">
    <div class="kr">양 (未)</div>
    <div class="en">Hitsuji / Ram</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/9_Saru.jpg" alt="원숭이">
    <div class="kr">원숭이 (申)</div>
    <div class="en">Saru / Monkey</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/10_Tori.jpg" alt="닭">
    <div class="kr">닭 (酉)</div>
    <div class="en">Tori / Bird</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/11_Inu.jpg" alt="개">
    <div class="kr">개 (戌)</div>
    <div class="en">Inu / Dog</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/12_I.jpg" alt="멧돼지">
    <div class="kr">멧돼지 (亥)</div>
    <div class="en">I / Boar</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/13_Gassho.jpg" alt="합장">
    <div class="kr">합장 (祈)</div>
    <div class="en">Gassho</div>
  </div>
  <div class="card">
    <img src="setting/sign_images/15_Mizunoe.jpg" alt="임">
    <div class="kr">임 (壬)</div>
    <div class="en">Mizunoe</div>
  </div>
</div>
</body>
</html>
